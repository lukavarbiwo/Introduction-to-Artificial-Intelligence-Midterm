<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Program Transfer Planner</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1,h2{
    text-align:center;
}

.program-name{
    text-align:center;
    font-size:20px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-bottom:25px;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:left;
}

th{
    background-color:#0077cc;
    color:white;
}

.controls{
    text-align:center;
    margin-bottom:20px;
}

select,button{
    padding:10px;
    font-size:16px;
}

button{
    background-color:#28a745;
    color:white;
    border:none;
    cursor:pointer;
    margin-left:10px;
}

button:hover{
    background-color:#1f8135;
}

#equivalencySection{
    display:none;
}
</style>
</head>
<body>

<div class="container">

<h1>Academic Program Transfer Planner</h1>

<div class="program-name">
Current Program: <strong>Computer Engineering</strong>
</div>

<h2>Course List</h2>

<table>
<thead>
<tr>
<th>Course</th>
<th>Passed</th>
</tr>
</thead>
<tbody id="courseTableBody">
</tbody>
</table>

<div class="controls">

<label><strong>Select Target Program:</strong></label>

<select id="targetProgram">
    <option>Computer Science</option>
    <option>Electrical and Electronics Engineering</option>
    <option>Mathematics</option>
</select>

<button onclick="transferCourses()">Transfer</button>

</div>

<div id="equivalencySection">

<h2>Equivalency Table</h2>

<table>
<thead>
<tr>
<th>Your Program Course (Completed)</th>
<th>Equivalent Course in New Program</th>
</tr>
</thead>
<tbody id="equivalencyBody">
</tbody>
</table>

</div>

</div>

<script>

const courses = [
{course:"Basics of Physics I (including Lab) (ENG)", passed:"Yes"},
{course:"Basics of Physics II (ENG)", passed:"Yes"},
{course:"Calculus I (ENG)", passed:"Yes"},
{course:"Calculus II (ENG)", passed:"Yes"},
{course:"Calculus III (ENG)", passed:"No"},
{course:"Introduction to Linear Algebra (ENG)", passed:"No"},
{course:"Introduction to Modern Thought I (ENG)", passed:"Yes"},
{course:"Algorithms and Data Structures (ENG)", passed:"No"},
{course:"Circuit Analysis I (ENG)", passed:"Yes"},
{course:"Computer Organization (ENG)", passed:"Yes"},
{course:"Computer and Data Networks (ENG)", passed:"No"},
{course:"Discrete Structures", passed:"Yes"},
{course:"English Language 1", passed:"Yes"},
{course:"English Language 2", passed:"Yes"},
{course:"English Language Course (B1-1)", passed:"Yes"},
{course:"English Language Course (B1-2)", passed:"Yes"},
{course:"Fundamentals of Programming (Laboratory)", passed:"Yes"},
{course:"Introduction to Artificial Intelligence (ENG)", passed:"No"},
{course:"Introduction to Computer Architecture", passed:"Yes"},
{course:"Introduction to Informatics I", passed:"Yes"},
{course:"Introduction to Programming (ENG)", passed:"Yes"},
{course:"Mathematical Foundation of Computing (ENG)", passed:"Yes"},
{course:"Principles of Numerical Methods (ENG)", passed:"No"},
{course:"Procedural Programming with C (ENG)", passed:"No"},
{course:"Scripting Languages", passed:"Yes"},
{course:"System Programming (ENG)", passed:"No"},

/* additional 5 courses */
{course:"Database Systems", passed:"Yes"},
{course:"Operating Systems", passed:"Yes"},
{course:"Object-Oriented Programming", passed:"Yes"},
{course:"Digital Logic Design", passed:"Yes"},
{course:"Software Engineering", passed:"Yes"}
];

const equivalencies = {
"Basics of Physics I (including Lab) (ENG)":"Physics I",
"Basics of Physics II (ENG)":"Physics II",
"Calculus I (ENG)":"Calculus I",
"Calculus II (ENG)":"Calculus II",
"Introduction to Modern Thought I (ENG)":"N/A",
"Circuit Analysis I (ENG)":"Circuit Theory",
"Computer Organization (ENG)":"Computer Architecture",
"Discrete Structures":"Discrete Mathematics",
"English Language 1":"English Language 1",
"English Language 2":"English Language 2",
"English Language Course (B1-1)":"English Language B1",
"English Language Course (B1-2)":"English Language B1",
"Fundamentals of Programming (Laboratory)":"Programming Laboratory",
"Introduction to Computer Architecture":"Computer Architecture",
"Introduction to Informatics I":"Introduction to Informatics",
"Introduction to Programming (ENG)":"Introduction to Programming",
"Mathematical Foundation of Computing (ENG)":"Discrete Mathematics",
"Scripting Languages":"Programming Languages",
"Database Systems":"Database Systems",
"Operating Systems":"Operating Systems",
"Object-Oriented Programming":"Object-Oriented Programming",
"Digital Logic Design":"Digital Electronics",
"Software Engineering":"Software Engineering"
};

function loadCourses(){

let tableBody = document.getElementById("courseTableBody");

courses.forEach(course=>{

let row = `
<tr>
<td>${course.course}</td>
<td>${course.passed}</td>
</tr>
`;

tableBody.innerHTML += row;

});

}

function transferCourses(){

document.getElementById("equivalencySection").style.display="block";

let body = document.getElementById("equivalencyBody");

body.innerHTML="";

courses.forEach(course=>{

if(course.passed==="Yes"){

let equivalent = equivalencies[course.course] || "N/A";

let row = `
<tr>
<td>${course.course}</td>
<td>${equivalent}</td>
</tr>
`;

body.innerHTML += row;

}

});

}

loadCourses();

</script>

</body>
</html>
```
